name: "user_tokens"
description: "Exact token counts from central logging proxy for GEAP Dashboard v2"
filter: '(resource.type="global" OR resource.type="cloud_run_revision") AND jsonPayload.event="gemini_call"'
valueExtractor: 'EXTRACT(jsonPayload.totalTokens)'
metricDescriptor:
  metricKind: "DELTA"
  valueType: "DISTRIBUTION"
  unit: "1"
  labels:
    - key: "user_id"
      valueType: "STRING"
      description: "The developer user ID"
    - key: "model_id"
      valueType: "STRING"
      description: "The model ID called"
labelExtractors:
  user_id: "EXTRACT(jsonPayload.userId)"
  model_id: "EXTRACT(jsonPayload.modelId)"
bucketOptions:
  exponentialBuckets:
    growthFactor: 2.0
    numFiniteBuckets: 64
    scale: 1.0
