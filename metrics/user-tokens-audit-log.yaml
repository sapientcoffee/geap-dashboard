name: "user_tokens"
description: "User requests tracker from Audit Logs for GEAP Dashboard v2"
filter: 'logName:"cloudaudit.googleapis.com%2Fdata_access" AND protoPayload.serviceName="aiplatform.googleapis.com" AND (protoPayload.methodName:"GenerateContent" OR protoPayload.methodName:"Predict")'
metricDescriptor:
  metricKind: "DELTA"
  valueType: "INT64"
  labels:
    - key: "user_id"
      valueType: "STRING"
      description: "Google Cloud identity of the caller"
    - key: "model_id"
      valueType: "STRING"
      description: "Target model name"
labelExtractors:
  user_id: "EXTRACT(protoPayload.authenticationInfo.principalEmail)"
  model_id: "REGEXP_EXTRACT(protoPayload.resourceName, \"models/(.*)\")"
